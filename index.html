<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Scryfall Lookup</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Crimson Text', Georgia, serif;
    background: #1a1a2e;
    color: #e8e0d0;
    min-height: 100dvh;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .search-row {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 600px;
  }

  input {
    flex: 1;
    font-family: 'Crimson Text', Georgia, serif;
    font-size: 20px;
    text-align: center;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #2a2a3e;
    color: #e8e0d0;
    outline: none;
    letter-spacing: 0.05em;
  }
  input::placeholder { color: #777; }
  input:focus { border-color: #7a6fa0; }
  
  #open-btn {
    display: none;
    width: 100%;
    max-width: 600px;
    font-family: 'Crimson Text', Georgia, serif;
    font-size: 16px;
    font-weight: 600;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #7a6fa0;
    background: transparent;
    color: #a090c0;
    cursor: pointer;
    text-align: center;
  }
  #open-btn:active { background: #2a2a3e; }
  button {
    font-family: 'Crimson Text', Georgia, serif;
    font-size: 18px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    background: #7a6fa0;
    color: #fff;
    cursor: pointer;
    white-space: nowrap;
  }
  button:active { opacity: 0.8; }

  #hint {
    font-size: 14px;
    color: #e08080;
    min-height: 18px;
    font-family: -apple-system, sans-serif;
  }

  #loading {
    color: #aaa;
    font-size: 16px;
    display: none;
    font-family: -apple-system, sans-serif;
  }

  #result {
    display: none;
    width: 100%;
    max-width: 600px;
    flex-direction: row;
    gap: 1rem;
    align-items: flex-start;
  }

  #card-img {
    width: 45%;
    min-width: 140px;
    border-radius: 10px;
    flex-shrink: 0;
  }

  .card-text {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .card-name {
    font-size: 17px;
    font-weight: 600;
    color: #f0e8d0;
    line-height: 1.2;
  }

  .card-mana {
    font-size: 13px;
    color: #b0a080;
    font-style: italic;
  }

  .card-type {
    font-size: 13px;
    color: #a09080;
    border-top: 1px solid #444;
    border-bottom: 1px solid #444;
    padding: 4px 0;
    font-style: italic;
  }

  .oracle {
    font-size: 15px;
    line-height: 1.5;
    white-space: pre-wrap;
    color: #d8d0c0;
  }

  .flavor {
    font-size: 13px;
    font-style: italic;
    color: #907060;
    border-top: 1px solid #333;
    padding-top: 6px;
    line-height: 1.4;
  }

  .pt {
    font-size: 15px;
    font-weight: 600;
    color: #c0b090;
    text-align: right;
  }
</style>
</head>
<body>

<div class="search-row">
  <input type="text" id="q" placeholder="FIN 398"
    autocomplete="off" autocorrect="off"
    autocapitalize="characters" spellcheck="false"
    onkeydown="if(event.key==='Enter')go()" />
  <button onclick="go()">Search</button>
</div>
<span id="hint"></span>
<span id="loading">Loading…</span>


<button id="open-btn" onclick="openScryfall()">Open on Scryfall ↗</button>
<div id="result">
  <img id="card-img" src="" alt="Card" />
  <div class="card-text">
    <div class="card-name" id="card-name"></div>
    <div class="card-mana" id="card-mana"></div>
    <div class="card-type" id="card-type"></div>
    <div class="oracle" id="card-oracle"></div>
    <div class="flavor" id="card-flavor"></div>
    <div class="pt" id="card-pt"></div>
  </div>
</div>

<script>
  document.getElementById('q').focus();
  function openScryfall() {
    if (lastUrl) window.open(lastUrl, '_blank');
  }
  async function go() {
    const val = document.getElementById('q').value.trim();
    const m = val.match(/^([A-Za-z0-9]+)\s+(\d+\S*)$/);
    const hint = document.getElementById('hint');
    if (!m) { hint.textContent = 'Try: BOK 129'; return; }
    hint.textContent = '';
    const set = m[1].toLowerCase();
    const cn = m[2];

    document.getElementById('result').style.display = 'none';
    document.getElementById('loading').style.display = 'block';

    try {
      const res = await fetch('https://api.scryfall.com/cards/' + set + '/' + cn);
      const card = await res.json();
      document.getElementById('loading').style.display = 'none';

      if (card.object === 'error') { hint.textContent = 'Card not found.'; return; }

      // Image
      let imgUrl = card.image_uris?.normal
        || card.card_faces?.[0]?.image_uris?.normal
        || '';

      // Oracle + flavor — handle DFCs
      let oracle = '', flavor = '';
      if (card.oracle_text !== undefined) {
        oracle = card.oracle_text;
        flavor = card.flavor_text || '';
      } else if (card.card_faces) {
        oracle = card.card_faces.map(f => f.name + '\n' + (f.oracle_text || '')).join('\n\n//\n\n');
        flavor = card.card_faces.map(f => f.flavor_text || '').filter(Boolean).join('\n\n');
      }

      // Mana cost
      let mana = card.mana_cost || card.card_faces?.[0]?.mana_cost || '';
      // Strip {W}{U} notation to simple text
      mana = mana.replace(/\{([^}]+)\}/g, '$1').replace(/\//g, '');

      // P/T or loyalty
      let pt = '';
      if (card.power) pt = card.power + ' / ' + card.toughness;
      else if (card.loyalty) pt = 'Loyalty: ' + card.loyalty;

      document.getElementById('card-img').src = imgUrl;
      document.getElementById('card-img').style.display = imgUrl ? 'block' : 'none';
      document.getElementById('card-name').textContent = card.name;
      document.getElementById('card-mana').textContent = mana;
      document.getElementById('card-type').textContent = card.type_line;
      document.getElementById('card-oracle').textContent = oracle;
      document.getElementById('card-flavor').textContent = flavor;
      document.getElementById('card-pt').textContent = pt;
      document.getElementById('result').style.display = 'flex';

    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      hint.textContent = 'Error fetching card.';
    }
  }
</script>
</body>
</html>
