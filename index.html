<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Scryfall Lookup</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Crimson Text', Georgia, serif;
    background: #1a1a2e;
    color: #e8e0d0;
    min-height: 100dvh;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .search-row {
    display: flex;
    gap: 6px;
    width: 100%;
    max-width: 500px;
  }

  input {
    flex: 1;
    min-width: 0;
    font-family: 'Crimson Text', Georgia, serif;
    font-size: 18px;
    text-align: center;
    padding: 10px 8px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #2a2a3e;
    color: #e8e0d0;
    outline: none;
    letter-spacing: 0.05em;
  }
  input::placeholder { color: #777; }
  input:focus { border-color: #7a6fa0; }

  .btn {
    font-family: 'Crimson Text', Georgia, serif;
    font-size: 18px;
    font-weight: 600;
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn:active { opacity: 0.8; }
  #search-btn { background: #7a6fa0; color: #fff; }
  #clear-btn {
    background: #2a2a3e;
    color: #888;
    border: 1px solid #444;
    font-size: 16px;
    padding: 10px 12px;
  }
  #clear-btn:active { background: #1e1e30; }

  #open-btn {
    display: none;
    width: 100%;
    max-width: 500px;
    font-family: 'Crimson Text', Georgia, serif;
    font-size: 16px;
    font-weight: 600;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #7a6fa0;
    background: transparent;
    color: #a090c0;
    cursor: pointer;
    text-align: center;
  }
  #open-btn:active { background: #2a2a3e; }

  #hint { font-size: 14px; color: #e08080; min-height: 18px; font-family: -apple-system, sans-serif; }
  #loading { color: #aaa; font-size: 16px; display: none; font-family: -apple-system, sans-serif; }

  #result {
    display: none;
    width: 100%;
    max-width: 500px;
    flex-direction: column;
    gap: 1rem;
  }

  /* Card flip */
  #card-wrap { width: 100%; perspective: 1000px; position: relative; }
  #card-wrap.flippable { cursor: pointer; }

  #card-flipper {
    width: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s ease;
  }
  #card-wrap.flipped #card-flipper { transform: rotateY(180deg); }

  #card-front, #card-back {
    width: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 12px;
    overflow: hidden;
  }
  #card-back {
    position: absolute;
    top: 0; left: 0;
    transform: rotateY(180deg);
    display: none;
  }
  #card-front img, #card-back img { width: 100%; display: block; border-radius: 12px; }

  #flip-icon {
    display: none;
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    border: 1.5px solid rgba(255,255,255,0.25);
    align-items: center;
    justify-content: center;
    z-index: 10;
    pointer-events: none;
  }
  #flip-icon svg { width: 20px; height: 20px; fill: rgba(255,255,255,0.8); }

  /* Mana symbols */
  .mana-sym {
    display: inline-block;
    width: 1.15em;
    height: 1.15em;
    vertical-align: middle;
    margin: 0 0.05em;
    position: relative;
    top: -0.05em;
  }

  .card-text { display: flex; flex-direction: column; gap: 6px; }
  .card-name { font-size: 22px; font-weight: 600; color: #f0e8d0; line-height: 1.2; }
  .card-mana { font-size: 19px; color: #b0a080; line-height: 1.8; }
  .card-type { font-size: 18px; color: #d8d0c0; border-top: 1px solid #444; border-bottom: 1px solid #444; padding: 4px 0; font-style: italic; }
  .oracle { font-size: 19px; line-height: 1.7; color: #d8d0c0; }
  .flavor { font-size: 16px; font-style: italic; color: #907060; border-top: 1px solid #333; padding-top: 6px; line-height: 1.4; }
  .pt { font-size: 15px; font-weight: 600; color: #c0b090; text-align: right; }
</style>
</head>
<body>

<div class="search-row">
  <button class="btn" id="clear-btn" onclick="clearInput()">✕</button>
  <input type="text" id="q" placeholder="FIN 398"
    autocomplete="off" autocorrect="off"
    autocapitalize="characters" spellcheck="false"
    onkeydown="if(event.key==='Enter')go()" />
  <button class="btn" id="search-btn" onclick="go()">Search</button>
</div>
<span id="hint"></span>
<span id="loading">Loading…</span>
<button id="open-btn" onclick="openScryfall()">Open on Scryfall ↗</button>

<div id="result">
  <div id="card-wrap">
    <div id="card-flipper">
      <div id="card-front"><img id="card-img-front" src="" alt="Card front" /></div>
      <div id="card-back"><img id="card-img-back" src="" alt="Card back" /></div>
    </div>
    <div id="flip-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
      </svg>
    </div>
  </div>
  <div class="card-text">
    <div class="card-name" id="card-name"></div>
    <div class="card-mana" id="card-mana"></div>
    <div class="card-type" id="card-type"></div>
    <div class="oracle" id="card-oracle"></div>
    <div class="flavor" id="card-flavor"></div>
    <div class="pt" id="card-pt"></div>
  </div>
</div>

<script>
  // Cache: symbol string (e.g. "W", "2/U") -> data URI string
  const symCache = {};

  // Fetch all symbols from Scryfall catalog once on load
  async function loadSymbols() {
    try {
      const res = await fetch('https://api.scryfall.com/symbology');
      const data = await res.json();
      await Promise.all(data.data.map(async sym => {
        const key = sym.symbol.replace(/[{}]/g, ''); // e.g. "{W}" -> "W"
        try {
          const svgRes = await fetch(sym.svg_uri);
          const svgText = await svgRes.text();
          const encoded = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgText);
          symCache[key] = encoded;
        } catch (_) {}
      }));
    } catch (_) {}
  }

  function renderMana(text) {
    return text.replace(/\{([^}]+)\}/g, (_, sym) => {
      const uri = symCache[sym];
      if (uri) return '<img class="mana-sym" src="' + uri + '" alt="{' + sym + '}" title="{' + sym + '}">';
      return '<span style="font-size:0.8em;background:#333;border-radius:50%;padding:1px 4px;">' + sym + '</span>';
    });
  }

  function renderOracle(text) {
    return text.split('\n').map(line => renderMana(line)).join('<br>');
  }

  function setFaceText(face) {
    document.getElementById('card-name').textContent = face.name;
    document.getElementById('card-mana').innerHTML = renderMana(face.mana_cost || '');
    document.getElementById('card-type').textContent = face.type_line || '';
    document.getElementById('card-oracle').innerHTML = renderOracle(face.oracle_text || '');
    document.getElementById('card-flavor').textContent = face.flavor_text || '';
    document.getElementById('card-pt').textContent = face.power ? face.power + ' / ' + face.toughness : (face.loyalty ? 'Loyalty: ' + face.loyalty : '');
  }

  function setSingleText(card) {
    document.getElementById('card-name').textContent = card.name;
    document.getElementById('card-mana').innerHTML = renderMana(card.mana_cost || '');
    document.getElementById('card-type').textContent = card.type_line || '';
    document.getElementById('card-oracle').innerHTML = renderOracle(card.oracle_text || '');
    document.getElementById('card-flavor').textContent = card.flavor_text || '';
    document.getElementById('card-pt').textContent = card.power ? card.power + ' / ' + card.toughness : (card.loyalty ? 'Loyalty: ' + card.loyalty : '');
  }

  let cardFaces = null;
  let lastUrl = '';

  function flipCard() {
    if (!cardFaces) return;
    const wrap = document.getElementById('card-wrap');
    const flipped = wrap.classList.toggle('flipped');
    setFaceText(cardFaces[flipped ? 1 : 0]);
  }

  function openScryfall() {
    if (lastUrl) window.open(lastUrl, '_blank');
  }

  function clearInput() {
    document.getElementById('q').value = '';
    document.getElementById('q').focus();
    document.getElementById('hint').textContent = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('open-btn').style.display = 'none';
  }

  document.getElementById('q').focus();
  loadSymbols(); // fetch once on page load

  async function go() {
    const parts = document.getElementById('q').value.trim().split(/\s+/);
    const hint = document.getElementById('hint');
    if (parts.length < 2) { hint.textContent = 'Try: FIN 398'; return; }
    hint.textContent = '';
    const set = parts[0].toLowerCase();
    const cn = parts[1];

    lastUrl = 'https://scryfall.com/search?q=s:' + set + '+cn:' + cn;
    cardFaces = null;

    const wrap = document.getElementById('card-wrap');
    wrap.classList.remove('flipped', 'flippable');
    wrap.onclick = null;
    document.getElementById('flip-icon').style.display = 'none';
    document.getElementById('card-back').style.display = 'none';
    document.getElementById('result').style.display = 'none';
    document.getElementById('open-btn').style.display = 'none';
    document.getElementById('loading').style.display = 'block';

    try {
      const res = await fetch('https://api.scryfall.com/cards/' + set + '/' + cn);
      const card = await res.json();
      document.getElementById('loading').style.display = 'none';

      if (card.object === 'error') { hint.textContent = 'Card not found.'; return; }
      if (card.scryfall_uri) lastUrl = card.scryfall_uri;

      const isDFC = card.card_faces && card.card_faces[0].image_uris;

      if (isDFC) {
        cardFaces = card.card_faces;
        document.getElementById('card-img-front').src = cardFaces[0].image_uris.normal;
        document.getElementById('card-img-back').src = cardFaces[1].image_uris.normal;
        document.getElementById('card-back').style.display = 'block';
        wrap.classList.add('flippable');
        wrap.onclick = flipCard;
        document.getElementById('flip-icon').style.display = 'flex';
        setFaceText(cardFaces[0]);
      } else {
        document.getElementById('card-img-front').src = card.image_uris?.normal || '';
        setSingleText(card);
      }

      document.getElementById('result').style.display = 'flex';
      document.getElementById('open-btn').style.display = 'block';

    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      hint.textContent = 'Error fetching card.';
    }
  }
</script>
</body>
</html>
